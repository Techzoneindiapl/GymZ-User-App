name: gymz_user
description: GymZ User App - discover and book fitness centers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.2

  # Navigation
  go_router: ^17.3.0

  # UI
  google_fonts: ^8.1.0

  # Network
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Storage
  flutter_secure_storage: ^10.3.1

  # Media
  image_picker: ^1.2.2
  video_player: ^2.8.6

  # Location
  geolocator: ^11.0.0

  # Utils
  intl: ^0.20.3
  characters: ^1.3.0
  flutter_local_notifications: ^18.0.1
  flutter_svg: ^2.0.10+1
  path_provider: ^2.1.3
  share_plus: ^10.1.2
  gal: ^2.3.2
  shimmer: ^3.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
   - "assets/images/"
   - "assets/logo/"

